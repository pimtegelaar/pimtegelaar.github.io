<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pim Tegelaar | Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <div class="hero-header-row">
                <div class="hero-name-pic">
                    <h1 class="big-name">Pim Tegelaar</h1>
                    <img src="me.jpg" alt="Pim Tegelaar" class="profile-pic big-pic">
                </div>
                <div class="hero-social-links">
                    <a href="https://github.com/pimtegelaar" id="github-btn-top" target="_blank" rel="noopener" aria-label="GitHub">
                        <img src="github.png" alt="GitHub" class="github-icon" />
                    </a>
                    <a href="https://www.linkedin.com/in/pimtegelaar/" id="linkedin-btn-top" target="_blank" rel="noopener" aria-label="LinkedIn">
                        <img src="linkedin.png" alt="LinkedIn" class="linkedin-icon" />
                    </a>
                </div>
            </div>
        </div>
    </header>
    <main>
        <section class="experience" id="experience">
            <h2>Experience</h2>
            <div style="display: flex; align-items: flex-start; position: relative;">
                <div class="timeline" id="timeline" style="position: relative;">
                    <div class="gear-rack"></div>
                    <!-- Experience cards will be injected here by JS -->
                    <div class="gear-rack gear-rack-right"></div>
                </div>
            </div>
        </section>
    </main>
    <footer>
        <div class="footer-links">
            <a href="https://github.com/pimtegelaar" id="github-btn" target="_blank" rel="noopener" aria-label="GitHub">
                <img src="github.png" alt="GitHub" class="github-icon" />
            </a>
            <a href="https://www.linkedin.com/in/pimtegelaar/" id="linkedin-btn" target="_blank" rel="noopener" aria-label="LinkedIn">
                <img src="linkedin.png" alt="LinkedIn" class="linkedin-icon" />
            </a>
        </div>
        <p>&copy; 2026 Pim Tegelaar</p>
    </footer>
    <script src="experiences.js"></script>
    <script src="script.js"></script>
</body>
</html>
